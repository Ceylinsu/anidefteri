<div id="guestbook-container" style="max-width: 700px; margin: 0 auto; padding: 20px;">
    <h2 style="text-align: center;">Sergi Hakkındaki Düşünceleriniz</h2>
    
    <div style="margin-bottom: 15px;">
        <input type="text" id="nameInput" placeholder="Adınız Soyadınız" required style="width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 5px; border: 1px solid #ccc;">
        <textarea id="messageInput" rows="4" placeholder="Sergiyle ilgili yorumunuzu buraya yazın..." required style="width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc;"></textarea>
    </div>
    
    <button id="submitBtn" style="background-color: #28a745; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; width: 100%; font-size: 16px; font-weight: bold;">Yorumu Bırak</button>

    <div id="comments-section" style="margin-top: 40px;">
        <h3>Ziyaretçi Yorumları</h3>
        <div id="commentsList">
            </div>
    </div>
</div>

<script type="module">
    // Firebase kütüphanelerini çağırıyoruz
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // DİKKAT: Buradaki bilgileri kendi Firebase projenden alıp değiştirmelisin
    const firebaseConfig = {
        apiKey: "SENIN_API_ANAHTARIN",
        authDomain: "proje-adin.firebaseapp.com",
        databaseURL: "https://proje-adin-default-rtdb.firebaseio.com",
        projectId: "proje-adin",
        storageBucket: "proje-adin.appspot.com",
        messagingSenderId: "SENDER_ID",
        appId: "APP_ID"
    };

    // Veritabanını başlat
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const nameInput = document.getElementById('nameInput');
    const messageInput = document.getElementById('messageInput');
    const submitBtn = document.getElementById('submitBtn');
    const commentsList = document.getElementById('commentsList');

    // Butona tıklandığında veriyi gönder
    submitBtn.addEventListener('click', () => {
        const name = nameInput.value.trim();
        const message = messageInput.value.trim();

        if(name !== "" && message !== "") {
            push(ref(db, 'sergi_yorumlari'), {
                name: name,
                message: message,
                timestamp: Date.now()
            });
            nameInput.value = ''; // Kutuları temizle
            messageInput.value = '';
        } else {
            alert("Lütfen adınızı ve mesajınızı eksiksiz girin!");
        }
    });

    // Yorumları anlık olarak ekrana çek ve yazdır
    onValue(ref(db, 'sergi_yorumlari'), (snapshot) => {
        commentsList.innerHTML = ''; // Önce listeyi temizle
        const data = snapshot.val();
        
        if(data) {
            // Yeni yorumlar en üstte görünsün
            const commentsArray = Object.entries(data).reverse();
            commentsArray.forEach(([id, comment]) => {
                const date = new Date(comment.timestamp).toLocaleDateString('tr-TR');
                
                // Mevcut sitenin temasını bozmayacak, şeffaf/hafif çerçeveli yorum kartları
                commentsList.innerHTML += `
                    <div style="background: rgba(0,0,0,0.03); padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 4px solid #007bff;">
                        <div style="font-weight: bold; margin-bottom: 5px;">${comment.name}</div>
                        <div style="font-size: 0.8em; color: #666; margin-bottom: 10px;">${date}</div>
                        <div style="line-height: 1.5;">${comment.message}</div>
                    </div>
                `;
            });
        } else {
            commentsList.innerHTML = '<p>Henüz yorum yapılmamış. İlk düşünceyi sen paylaş!</p>';
        }
    });
</script>
